name: Compilar APK Android

on:
  workflow_dispatch: # Permite ejecutar la compilación manualmente con un botón

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Extraer código fuente
        uses: actions/checkout@v3

      - name: Configurar Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'

      - name: Instalar Dependencias Web
        run: npm install

      - name: Compilar Producción Web (Vite)
        run: npm run build

      - name: Sincronizar Puente Nativo (Capacitor)
        run: npx cap sync android

      - name: Configurar entorno Java JDK
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Conceder permisos de ejecución a Gradle
        working-directory: ./android
        run: chmod +x gradlew

      - name: Ensamblar APK de Android
        working-directory: ./android
        run: ./gradlew assembleDebug

      - name: Entregar Artefacto Final (APK)
        uses: actions/upload-artifact@v3
        with:
          name: WarControl-App
          path: android/app/build/outputs/apk/debug/app-debug.apk
